    <header class="site-header">

            <a class="logo" href="index.html">InternPhish</a>

                <a href="submit.html">Submit</a>

    <main class="reports-page">

            <div class="reports-top">
                <div class="reports-heading">
                    <h1>Reports Hub</h1>

                    <input id="reports-search" type="search" placeholder="Search by org, tag, or keyword…"
                        aria-label="Search reports" autocomplete="off" />

            </div>

            <div class="tag-filter-bar" role="group" aria-label="Filter by tag">
                <button class="tag-filter-btn" data-tag="registration fee">registration fee</button>
                <button class="tag-filter-btn" data-tag="no interview">no interview</button>
                <button class="tag-filter-btn" data-tag="certificate scam">certificate scam</button>

                <button class="tag-filter-btn" data-tag="upfront payment">upfront payment</button>
                <button class="tag-filter-btn" data-tag="urgent">urgent</button>
                <button class="tag-filter-btn" data-tag="limited slots">limited slots</button>
                <button class="tag-filter-btn" data-tag="work from home">work from home</button>
            </div>

            <div class="reports-grid" id="reports-grid" role="list"></div>
            <p class="no-results" id="no-results" hidden>No reports matched your search.</p>
        </div>
    </main>
